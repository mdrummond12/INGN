# Firebase App Hosting configuration for the ingn-api backend.
# Deployed automatically when you push to the connected branch.
# Docs: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 5
  concurrency: 80

env:
  - variable: API_HOST
    value: mobileorderprodapi.transactcampus.com
    availability:
      - RUNTIME

  - variable: ALLOWED_ORIGINS
    value: "https://ingn-2e1e9.web.app,https://ingn-2e1e9.firebaseapp.com"
    availability:
      - RUNTIME

  - variable: FIREBASE_PROJECT_ID
    value: ingn-2e1e9
    availability:
      - RUNTIME

  # Note: the Mobie API key is supplied per-request by the signed-in user
  # via the `x-mobie-api-key` header — not held server-side. Future iteration
  # will store each user's key encrypted in Firestore.
