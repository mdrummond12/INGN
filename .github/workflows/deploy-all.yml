name: Manual Firebase Deploy

# Manually-triggered deploy. Pick a target from the dropdown.
# `all` runs `firebase deploy` (deploys every target defined in firebase.json).
# `hosting` deploys just Firebase Hosting.

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'What to deploy'
        type: choice
        required: true
        default: hosting
        options:
          - all
          - hosting

jobs:
  deploy:
    name: Deploy ${{ github.event.inputs.target }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_FIREBASE_API_KEY:     ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:  ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID:      ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_GRAPHQL_URL:          ${{ secrets.VITE_GRAPHQL_URL }}
        run: npm run build

      - name: Authenticate to Firebase
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy
        run: |
          if [ "${{ github.event.inputs.target }}" = "all" ]; then
            firebase deploy --project ingn-2e1e9 --non-interactive
          else
            firebase deploy --only ${{ github.event.inputs.target }} --project ingn-2e1e9 --non-interactive
          fi
