name: Build and Deploy Frontend

# Builds the Vite SPA on every push and PR (catches broken builds early).
# On main pushes (and manual dispatch), also deploys to Firebase Hosting.

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/deploy-hosting.yml'
  pull_request:
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_FIREBASE_API_KEY:     ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:  ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID:      ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_GRAPHQL_URL:          ${{ secrets.VITE_GRAPHQL_URL }}
        run: npm run build

      - name: Confirm dist output
        run: ls -lh frontend/dist/

      # Deploy steps skip on PRs — PR builds only check that the build works.
      - name: Authenticate to GCP
        if: github.event_name != 'pull_request'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Cloud SDK
        if: github.event_name != 'pull_request'
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Firebase CLI
        if: github.event_name != 'pull_request'
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        if: github.event_name != 'pull_request'
        run: firebase deploy --only hosting --project ingn-2e1e9 --non-interactive
